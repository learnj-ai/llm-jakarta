version: '3.8'

services:
  rest-backend:
    build:
      context: ..
      dockerfile: ./step-09-mcp/step-09-mcp-rest-backend/Dockerfile
    ports:
      - "8809:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-api-key}
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - rest-logs:/opt/jboss/wildfly/standalone/log
      - ../step-09-mcp/step-09-mcp-rest-backend/docker-data/deployments:/opt/jboss/wildfly/standalone/deployments
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/llm-jakarta/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Give the container time to start before first health‑check
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - llm-jakarta-network

  server:
    build:
      context: ..
      dockerfile: ./step-09-mcp/step-09-mcp-server/Dockerfile
    ports:
      - "8810:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-api-key}
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - server-logs:/opt/jboss/wildfly/standalone/log
      - ../step-09-mcp/step-09-mcp-server/docker-data/deployments:/opt/jboss/wildfly/standalone/deployments
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/llm-jakarta/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Give the container time to start before first health‑check
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - llm-jakarta-network
    depends_on:
      - rest-backend

networks:
  llm-jakarta-network:
    driver: bridge   # Default bridge network is usually sufficient

volumes:
  rest-logs: {}
  server-logs: {}
