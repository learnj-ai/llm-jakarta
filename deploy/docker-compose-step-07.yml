version: '3.8'

services:
  llm-jakarta-step-07:
    build:
      context: ../step-07-multi-model
      dockerfile: ../step-07-multi-model/Dockerfile
    ports:
      - "8807:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your-api-key}
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - logs-step-07:/opt/jboss/wildfly/standalone/log
      - ../step-07-multi-model/docker-data/deployments:/opt/jboss/wildfly/standalone/deployments
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/llm-jakarta/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Give the container time to start before first health‑check
    deploy:
      resources:
        limits:
          cpus: '1.0'      # Use '1.0' for clarity
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - llm-jakarta-network

networks:
  llm-jakarta-network:
    driver: bridge   # Default bridge network is usually sufficient

volumes:
  logs-step-07: {}           # Define the named volume for logs