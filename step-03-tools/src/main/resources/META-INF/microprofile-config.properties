# OpenAI API Configuration
langchain4j.open-ai.api-key=${OPENAI_API_KEY}

# Allowed models list including GPT-5 family
langchain4j.open-ai.chat-model.allowed-models=gpt-5, gpt-5-mini, gpt-5-nano, gpt-4,gpt-4o, gpt-4.1, gpt-4.1-mini, gpt-4.1-nano, gpt-4o-mini,o1-preview,o1-mini,gpt-4-turbo,gpt-3.5-turbo,gpt-4.5-preview

# Default model - using GPT-5 nano for tools integration
langchain4j.open-ai.chat-model.model-name=gpt-5-nano
langchain4j.open-ai.chat-model.temperature=0.2
langchain4j.open-ai.chat-model.top-p=1.0
langchain4j.open-ai.chat-model.timeout=PT400S
langchain4j.open-ai.chat-model.max-tokens=5000
langchain4j.open-ai.chat-model.frequency-penalty=0
langchain4j.open-ai.chat-model.log-requests=false
langchain4j.open-ai.chat-model.log-responses=false

# Tools and memory configuration
langchain4j.open-ai.chat-model.max-memory-size=50

# GitHub API Configuration
github.token=${GITHUB_TOKEN}