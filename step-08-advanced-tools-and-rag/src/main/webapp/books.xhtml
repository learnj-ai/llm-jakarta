<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Book Store - Jakarta EE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&amp;family=Fira+Code:wght@400;500&amp;display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="#{request.contextPath}/resources/css/chat-enhanced.css"/>
    <link rel="stylesheet" href="#{request.contextPath}/resources/css/bookstore.css"/>
    <script src="#{request.contextPath}/resources/js/chat.js"></script>

    <script>
        window.addEventListener("load", function() {
            connectUpdateWebSocket();
        });

        function toggleCart() {
            const cartDialog = document.getElementById('cartDialog');
            if (cartDialog.style.display === 'none') {
                cartDialog.style.display = 'block';
            } else {
                cartDialog.style.display = 'none';
            }
        }
    </script>

</h:head>
<h:body>
    <div class="bookstore-container">
        <header class="store-header">
            <div class="logo">
                <img src="#{request.contextPath}/resources/images/jakartaee.jpg" alt="Jakarta EE Logo"/>
                <h1>Jakarta Book Store</h1>
            </div>
            <div class="search-bar">
                <h:form>
                    <h:inputText value="#{bookStoreBean.searchQuery}" 
                               placeholder="Search books..."
                               styleClass="search-input"/>
                    <h:commandButton value="Search" 
                                   action="#{bookStoreBean.searchBooks}"
                                   styleClass="search-button">
                        <f:ajax execute="@form" render="bookList"/>
                    </h:commandButton>
                </h:form>
            </div>
            <div class="cart-info" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <h:outputText id="cartCount" styleClass="cart-count" value="#{bookStoreBean.cartItemCount}"/>
            </div>

            <!-- Cart Dialog -->
            <h:panelGroup id="cartDialog" layout="block" styleClass="cart-dialog" style="display: none;">
                <div class="cart-dialog-content">
                    <h2>Shopping Cart</h2>
                    <h:panelGroup id="cartItems">
                        <ui:repeat value="#{bookStoreBean.currentCart.cart.items}" var="item">
                            <div class="cart-item">
                                <span class="cart-item-title">#{item.book.title}</span>
                                <span class="cart-item-quantity">Qty: #{item.quantity}</span>
                                <span class="cart-item-price">$#{item.book.price * item.quantity}</span>
                                <h:form>
                                    <h:commandButton value="Remove" 
                                                   action="#{bookStoreBean.removeFromCart(item.book.isbn)}"
                                                   styleClass="remove-item-btn">
                                        <f:ajax execute="@form" render=":cartDialog :cartCount :bookList"/>
                                    </h:commandButton>
                                </h:form>
                            </div>
                        </ui:repeat>
                        <div class="cart-total">
                            Total: $#{bookStoreBean.cartTotal}
                        </div>
                    </h:panelGroup>
                    <button onclick="toggleCart()" class="close-cart-btn">Close</button>
                </div>
            </h:panelGroup>
            <h:form id="refreshForm" style="display: none;">
                <h:commandButton id="refreshButton" value="Refresh" action="#{bookStoreBean.refreshBooks}">
                    <f:ajax execute="@this" render=":bookList :cartCount :cartDialog"/>
                </h:commandButton>
            </h:form>
        </header>

        <main class="store-content">
            <aside class="categories">
                <h2>Categories</h2>
                <h:form>
                    <ul>
                        <li>
                            <h:commandLink value="All Books" 
                                         action="#{bookStoreBean.showAllBooks}">
                                <f:ajax render="bookList"/>
                            </h:commandLink>
                        </li>
                        <li>
                            <h:commandLink value="Programming" 
                                         action="#{bookStoreBean.filterByCategory('Programming')}">
                                <f:ajax render="bookList"/>
                            </h:commandLink>
                        </li>
                        <li>
                            <h:commandLink value="Jakarta EE"
                                           action="#{bookStoreBean.filterByCategory('Jakarta EE')}">
                                <f:ajax render="bookList"/>
                            </h:commandLink>
                        </li>
                    </ul>
                </h:form>
            </aside>

            <h:panelGroup id="bookList" layout="block" styleClass="book-grid">
                <ui:repeat value="#{bookStoreBean.books}" var="book">
                    <h:panelGroup layout="block" styleClass="book-card">
                        <h:graphicImage value="/resources/#{book.imageUrl}"
                                      alt="#{book.title}" 
                                      styleClass="book-cover"/>
                        <h:panelGroup layout="block" styleClass="book-info">
                            <h:outputText value="#{book.title}" styleClass="h3"/>
                            <h:outputText value="by #{book.author}" styleClass="author"/>
                            <h:outputText value="$#{book.price}" styleClass="price"/>
                            <h:outputText value="#{book.stockQuantity} in stock" styleClass="stock"/>
                            <h:form>
                                <h:commandButton value="Add to Cart" 
                                               action="#{bookStoreBean.addToCart(book.isbn)}"
                                               styleClass="add-to-cart-btn">
                                    <f:ajax execute="@this" render="@form :bookList :cartCount :cartDialog"/>
                                </h:commandButton>
                            </h:form>
                        </h:panelGroup>
                    </h:panelGroup>
                </ui:repeat>
            </h:panelGroup>
        </main>
    </div>

    <!-- Include the chat component -->
    <ui:include src="chat.xhtml" />
</h:body>
</html>
